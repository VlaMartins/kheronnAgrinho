<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Agrinho com o Kheronn </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1> Monitor Agro </h1>
            <p> Equilibrio entre produção e meio ambiente. </p>
        </header>

        <section class="config-fazenda">
            <input type="number" name="producao" id="producao" placeholder="Hectares de Produção">
            <input type="number" name="mata" id="mata" placeholder="Hectares de Mata">
            <button id="btnAtualizar" onclick="atualizarMonitor"> Atualizar Painel </button>
        </section>

        <section class="dashboard">
            <div class="card" id="cardProducao">
                <h3> Produção Agrícola </h3>
                <div class="icone"> 🚜 🚜 </div>
                <p id="txtProducao"> 0 ha </p> 
            </div>

            <div class="card" id="cardPreservacao">
                <h3> Área de Preservação </h3>
                <div class="icone"> 🌳 🌳 </div>
                <p id="txtPreservacao"> 0 ha </p> 
            </div>
        </section>

        <section id="mensagemStatus">
            Aguardando dados para análise... 
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
